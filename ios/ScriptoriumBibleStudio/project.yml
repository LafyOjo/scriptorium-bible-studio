name: ScriptoriumBibleStudio
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  ScriptoriumBibleStudio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScriptoriumBibleStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lovable.scriptoriumbiblestudio
        PRODUCT_NAME: Scriptorium
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Scriptorium
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: NO
schemes:
  ScriptoriumBibleStudio:
    build:
      targets:
        ScriptoriumBibleStudio: all
    run:
      config: Debug
    archive:
      config: Release
