name: ScriptoriumBibleStudio
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  ScriptoriumBibleStudio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScriptoriumBibleStudio
    info:
      path: ScriptoriumBibleStudio/Support/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleDisplayName: Scriptorium
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIAppFonts:
          - Cinzel[wght].ttf
          - CormorantGaramond[wght].ttf
          - CormorantGaramond-Italic[wght].ttf
          - Inter[opsz,wght].ttf
          - Inter-Italic[opsz,wght].ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lafoireprobook.scriptoriumbiblestudio
        PRODUCT_NAME: Scriptorium
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  ScriptoriumBibleStudio:
    build:
      targets:
        ScriptoriumBibleStudio: all
    run:
      config: Debug
    archive:
      config: Release
